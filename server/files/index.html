<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies!</title>
    <style>
        body {
            font-family: Monaco, 'Courier New', monospace;
            background-color: #1a1a2e;
            color: #e0e0e0;
        }

        .moviesList {
            display: flex;
            flex-wrap: wrap;
            gap: 50px;
            margin: 0 20px;
        }

        .movie {
            border: 1px solid #3a3a5c;
            padding: 15px;
            width: 350px;
            height: 600px;
            position: relative;
            border-radius: 16px;
            background-color: #16213e;
        }

        .movie-title {
            font-size: 1.2em;
            font-weight: bold;
            margin: 10px 0 5px 0;
        }

        .movie:hover {
            box-shadow: 0 0 14px rgba(212, 175, 55, 0.4);
            border-color: #d4af37;
        }

        .movie-poster {
            height: 300px;
            width: auto;
            object-fit: contain;
            display: flex;
            margin: auto;
            border-radius: 16px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 5px solid #3a3a5c;
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        .detail-container {
            display: flex;
            gap: 30px;
            max-width: 900px;
            margin: 0 20px;
        }

        .detail-poster {
            max-height: 450px;
            border-radius: 16px;
        }

        .detail-info {
            flex: 1;
        }

        .detail-info h3 {
            margin-top: 0;
            font-size: 1.5em;
            color: #d4af37;
        }

        .detail-info dl {
            margin: 0;
        }

        .detail-info dt {
            font-weight: bold;
            margin-top: 10px;
            color: #d4af37;
        }

        .detail-info dd {
            margin: 2px 0 0 0;
        }

        .genre {
            display: inline-block;
            background-color: #2a2a4a;
            padding: 3px 10px;
            border-radius: 12px;
            margin-right: 5px;
            font-size: 0.9em;
            color: #d4af37;
            border: 1px solid #3a3a5c;
        }

        .button {
            display: block;
            width: 250px;
            padding: 10px;
            font-size: medium;
            border-radius: 20px;
            color: #1a1a2e;
            background-color: #d4af37;
            cursor: pointer;
            border: none;
            font-weight: bold;
            transition: box-shadow 0.2s, background-color 0.2s;
        }

        .button:hover {
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.6);
            background-color: #e6c54b;
        }

        .show-details-button {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        .close-button {
            margin-top: 20px;
        }

        hr.rounded {
            border-top: 4px solid #3a3a5c;
            border-radius: 5px;
            margin: 1rem 0;
        }

        h1 {
            color: #d4af37;
        }

        h2 {
            color: #d4af37;
        }

        .movie-title {
            color: #d4af37;
        }

        @media screen and (max-width: 768px) {
            .detail-container {
                flex-direction: column;
                align-items: center;
            }

            .detail-poster {
                max-width: 100%;
                height: auto;
            }

            .detail-info {
                width: 100%;
            }
        }
    </style>
    <script>
        let movies = []
        window.onload = function () {
            const xhr = new XMLHttpRequest()
            xhr.onload = function () {
                const moviesElement = document.querySelector(".moviesList")
                moviesElement.innerHTML = ""    // as soon as the request is done, remove the spinner
                if (xhr.status == 200) {
                    movies = JSON.parse(xhr.responseText)
                    movies.forEach(movie => {
                        const movieElement = document.createElement("article")
                        movieElement.classList.add("movie")

                        movieElement.innerHTML = `
                            <img src="${movie.poster}" alt="Poster of '${movie.title}'" class="movie-poster">
                            <hr />
                            <p class="movie-title">${movie.title}</p>
                            <p class="movie-plot">${movie.plot}</p>
                            <button class="button show-details-button" onclick="showDetails(${movies.indexOf(movie)})">Show details</button>
                        `
                        moviesElement.append(movieElement)
                    })
                } else {
                    moviesElement.append("Daten konnten nicht geladen werden, Status " + xhr.status + " - " + xhr.statusText)
                }
            }
            xhr.open("GET", "/movies")
            xhr.send()
        }

        function showDetails(index) {
            const detailsElement = document.querySelector("#movieDetails")
            const movieList = document.querySelector("#movieList")

            const movie = movies[index]
            const releasedDate = new Date(movie.released).toLocaleDateString("de-AT", { year: "numeric", month: "long", day: "numeric" })
            const genreTags = movie.genres.map(g => `<span class="genre">${g.trim()}</span>`).join(" ")

            // dl is a description list, dt is the title and dd is the description, it is used here to display the movie details in a structured way
            detailsElement.innerHTML = `
                <article class="detail-container">
                    <img src="${movie.poster}" alt="Poster of '${movie.title}'" class="detail-poster">
                    <div class="detail-info">
                        <h2>${movie.title}</h2>
                        <dl>
                            <dt>Released</dt>
                            <dd>${releasedDate}</dd>
                            <dt>Runtime</dt>
                            <dd>${movie.runtime} min</dd>
                            <dt>Genres</dt>
                            <dd>${genreTags}</dd>
                            <dt>Directors</dt>
                            <dd>${movie.directors.join(", ")}</dd>
                            <dt>Writers</dt>
                            <dd>${movie.writers.join(", ")}</dd>
                            <dt>Actors</dt>
                            <dd>${movie.actors.join(", ")}</dd>
                            <dt>Metascore</dt>
                            <dd>${movie.metascore}</dd>
                            <dt>IMDb Rating</dt>
                            <dd>${movie.imdbRating}</dd>
                            <dt>Plot</dt>
                            <dd>${movie.plot}</dd>
                        </dl>
                        <button class="button close-button" onclick="hideDetails()">Back to list</button>
                    </div>
                </article>
            `
            detailsElement.classList.remove("hidden")
            movieList.classList.add("hidden")
        }

        function hideDetails() {
            const detailsElement = document.querySelector("#movieDetails")
            const movieList = document.querySelector("#movieList")
            movieList.classList.remove("hidden")
            detailsElement.classList.add("hidden")
        }
    </script>
</head>
<body>
    <header>
        <h1>Movies!</h1>
        <p>Lists all Harry Potter movies, click on them to get more details!</p>
        <hr class="rounded" />
    </header>
    <main>
        <section id="movieList">
            <div class="moviesList">
                <div class="spinner"></div>
            </div>
        </section>
        <section id="movieDetails" class="hidden"></section>
    </main>
</body>
</html>
